@if (content) {
  @if (content.template == 'code') {
      @if (content.toolbar) {
        <smart-toolbar #toolbar [user]="user.user" [fields]="content.toolbar" [values]="toolbarValue" (action)="execute($event)"></smart-toolbar>
      }
      <code-editor
        [(ngModel)]="data"
        [languages]="languages"
        [language]="content.language || 'javascript'"
        [readonly]="content.readonly || false"
        [theme]="content.theme || 'dark'"
        (change)="onChange($event)"
      />
  } @else {
    模板类型应该是code
  }
} @else {
  <nz-skeleton />
}
