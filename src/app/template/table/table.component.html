@if (content) {
  @if (content.template == 'table') {
    <nz-card [nzTitle]="content.title" [nzExtra]="extra">
      @if (content.toolbar) {
        <smart-toolbar #toolbar [fields]="content.toolbar" [values]="toolbarValue"
                       (action)="execute($event)"></smart-toolbar>
      }
      <smart-table #table
                   [columns]="content.columns"
                   [operators]="content.operators"
                   [batch]="content.batch"
                   [datum]="data"
                   [total]="total"
                   [loading]="loading"
                   (query)="load($event)"
                   (action)="execute($event.action, $event.data, $event.index)"
      ></smart-table>
    </nz-card>
    <ng-template #extra>
      @if (content.load_api || content.search || content.search_api) {
        <button nz-button nzType="link" (click)="load()" class="load">
          <span nz-icon nzType="reload" [nzSpin]="loading"></span>
          刷新
        </button>
      }
    </ng-template>
  } @else {
    模板类型应该是table
  }
} @else {
  <nz-spin nzSimple></nz-spin>
}
