@if (content) {
  @if (content.template == 'form') {
      @if (content.toolbar) {
        <smart-toolbar #toolbar [user]="user.user" [fields]="content.toolbar" [values]="toolbarValue" (action)="execute($event)"></smart-toolbar>
      }
      <smart-editor #editor [user]="user.user" [fields]="content.fields" [values]="data" (action)="execute($event)"></smart-editor>

      <button nz-button nzType="text" nzType="primary" (click)="submit()">
        <span nz-icon nzType="save" [nzSpin]="submitting"></span>
        提交
      </button>
  } @else {
    模板类型应该是form
  }
} @else {
  <nz-spin nzSimple></nz-spin>
}
