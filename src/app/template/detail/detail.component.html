@if (content) {
  @if (content.template == 'detail') {
      @if (content.toolbar) {
        <smart-toolbar #toolbar [user]="user.user" [fields]="content.toolbar" [values]="toolbarValue" (action)="execute($event)"></smart-toolbar>
      }
      <smart-info [user]="user.user" [fields]="content.fields || []" [value]="data" (action)="execute($event)"></smart-info>
  } @else {
    模板类型应该是detail
  }
} @else {
  <nz-skeleton />
}
