@if (content) {
  @if (content.template == 'chart') {
      @if (content.toolbar) {
        <smart-toolbar #toolbar [user]="user.user" [fields]="content.toolbar" [values]="toolbarValue" (action)="execute($event)"></smart-toolbar>
      }
      <div echarts [options]="chartOption"
        [merge]="mergeOption"
        [theme]="chartTheme"
        [style.height]="chartHeight+'px'"
      ></div>
  } @else {
    模板类型应该是info
  }
} @else {
  <nz-skeleton />
}
