@if (content) {
  @if (content.template == 'info') {
    <nz-card [nzTitle]="content.title" [nzExtra]="extra">
      @if (content.toolbar) {
        <smart-toolbar #toolbar [user]="user?.user" [fields]="content.toolbar" [values]="toolbarValue" (action)="execute($event)"></smart-toolbar>
      }
      <smart-info [user]="user?.user" [fields]="content.items || []" [value]="data" (action)="execute($event)"></smart-info>
    </nz-card>
    <ng-template #extra>
      @if (content.load_api) {
        <button nz-button nzType="link" (click)="load()" class="load">
          <span nz-icon nzType="reload" [nzSpin]="loading"></span>
          刷新
        </button>
      }
    </ng-template>
  } @else {
    模板类型应该是info
  }
} @else {
  <nz-spin nzSimple></nz-spin>
}
