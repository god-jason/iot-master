version: 2
project_name: iot-master
before:
  hooks:
    - go mod tidy
builds:
  - env:
      - CGO_ENABLED=0
    git:
      ignore_dirty: true
      #临时加入
    id: "iot-master"
    main: main.go
    binary: "iot-master"
    ldflags:
      - -s -w -X github.com/god-jason/iot-master/pkg/build.Version={{.Version}}
    goos:
      - windows
      - linux
      #- darwin
    goarch:
      - "386"
      - amd64
      - arm
      - arm64
      #- mips
      #- mipsle #默认小端
      #- mips64
      #- mips64le
      - loong64 #龙芯
      #- riscv32
      #- riscv64
    goarm:
      - 6
      - 7
    gomips:
      - hardfloat
      - softfloat
    ignore:
      - goos: linux
        goarch: "386"
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: arm64
      - goarch: mips64le
        gomips: softfloat

archives:
  - wrap_in_directory: true
    #name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - menu.json
      - pages
      - tables
      - protocols
      - README.md
      - LICENSE
checksum:
  name_template: 'checksums.txt'
changelog:
  use: github-native
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
